spring:
  datasource:
    url: jdbc:h2:mem:weai;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  docker:
    compose:
      enabled: false

management:
  endpoints:
    enabled-by-default: false
