spring:
  datasource:
    url: jdbc:h2:mem:weai;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  docker:
    compose:
      enabled: false
  jwt:
    secret: test-secret-key-that-is-at-least-32-bytes-long
    issuer: we-ai-server-test
    accessTokenExpiration: PT30M
    refreshTokenExpiration: PT12H

management:
  endpoints:
    enabled-by-default: false

app:
  auth:
    username: test-admin
    password: test-admin1234!
