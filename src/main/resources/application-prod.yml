spring:
  jpa:
    hibernate:
      ddl-auto: validate
  docker:
    compose:
      enabled: false

logging:
  level:
    root: warn
    com.weai.server: info
    org.springframework.security: warn
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: error

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

app:
  web:
    base-url: ${APP_BASE_URL:https://api.example.com}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:https://we-ai-client.vercel.app}
    external-domains:
      api-domain: ${APP_API_DOMAIN:api.example.com}
      frontend-domain: ${APP_FRONTEND_DOMAIN:we-ai-client.vercel.app}
      storage-console-domain: ${APP_STORAGE_CONSOLE_DOMAIN:minio.example.com}
    cors:
      allowed-origins:
        - ${APP_FRONTEND_BASE_URL:https://we-ai-client.vercel.app}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - X-Requested-With
        - X-Request-Id
      exposed-headers:
        - X-Request-Id
      allow-credentials: true
      max-age: 1h
