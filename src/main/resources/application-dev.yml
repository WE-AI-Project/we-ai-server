spring:
  output:
    ansi:
      enabled: always
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only

logging:
  level:
    org.hibernate.SQL: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [req:%X{requestId:-}] %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      show-details: always

app:
  auth:
    username: ${APP_AUTH_USERNAME:dev-admin}
    password: ${APP_AUTH_PASSWORD:change-me-dev-admin-password}
  web:
    base-url: ${APP_BASE_URL:http://localhost:8080}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
    external-domains:
      api-domain: ${APP_API_DOMAIN:localhost}
      frontend-domain: ${APP_FRONTEND_DOMAIN:localhost}
      storage-console-domain: ${APP_STORAGE_CONSOLE_DOMAIN:localhost}
