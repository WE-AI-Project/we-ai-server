ollama:
  base-url: https://ollama.yhy-server.com/
  models:
    oracle: SYNAIPSE_Oracle
    architect: SYNAIPSE_Architect
    sync: SYNAIPSE_Sync

spring:
  application:
    name: we-ai-server
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:we_ai}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:weai}
    password: ${DB_PASSWORD:change-me-db-password}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    connect-retries: 60
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false
      lifecycle-management: start_only
  mvc:
    throw-exception-if-no-handler-found: true
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-key-at-least-32-bytes}
    issuer: ${JWT_ISSUER:we-ai-server}
    accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT1H}
    refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:P7D}

server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] [%thread] %logger{36} : %msg%n%wEx"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    authorization-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me

  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}
    authorization-uri: https://nid.naver.com/oauth2.0/authorize
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost/api/v1/auth/google/callback}
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo

auth:
  verification:
    code-length: ${AUTH_VERIFICATION_CODE_LENGTH:6}
    expiration: ${AUTH_VERIFICATION_EXPIRATION:PT5M}
    mock-enabled: ${AUTH_VERIFICATION_MOCK_ENABLED:false}
    expose-code-in-response: ${AUTH_VERIFICATION_EXPOSE_CODE_IN_RESPONSE:false}
    email-subject: ${AUTH_VERIFICATION_EMAIL_SUBJECT:[WE AI] Login verification code}
    email-from: ${AUTH_VERIFICATION_EMAIL_FROM:${MAIL_USERNAME:}}
    kakao-talk:
      message-uri: ${KAKAO_TALK_MESSAGE_URI:https://kapi.kakao.com/v2/api/talk/memo/default/send}

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:${MINIO_API_PORT:9000}}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:change-me-minio-password}
    public-bucket: ${MINIO_PUBLIC_BUCKET:we-ai-public}
    private-bucket: ${MINIO_PRIVATE_BUCKET:we-ai-private}

app:
  web:
    local-base-url: ${APP_LOCAL_BASE_URL:http://localhost:${SERVER_PORT:8080}}
    base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
    external-domains:
      api-domain: ${APP_API_DOMAIN:localhost}
      frontend-domain: ${APP_FRONTEND_DOMAIN:localhost}
      storage-console-domain: ${APP_STORAGE_CONSOLE_DOMAIN:localhost}
    cors:
      allowed-origins:
        - ${APP_FRONTEND_BASE_URL:http://localhost:3000}
        - ${APP_ADDITIONAL_LOCAL_FRONTEND_BASE_URL:http://127.0.0.1:3000}
        - ${APP_VITE_FRONTEND_BASE_URL:http://localhost:5173}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - X-Requested-With
        - X-Request-Id
      exposed-headers:
        - X-Request-Id
      allow-credentials: true
      max-age: 1h
