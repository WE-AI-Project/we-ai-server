services:
  app:
    profiles: ["stag", "prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: '${APP_CONTAINER_NAME:-we-ai-app}'
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: '${APP_PROFILE:-stag}'
      SERVER_PORT: '8080'
      DB_HOST: 'mysql'
      DB_PORT: '3306'
      DB_NAME: '${DB_NAME:-we_ai}'
      DB_USERNAME: '${DB_USERNAME:-weai}'
      DB_PASSWORD: '${DB_PASSWORD:-change-me-db-password}'
      JWT_SECRET: '${JWT_SECRET:-change-this-jwt-secret-key-at-least-32-bytes}'
      JWT_ISSUER: '${JWT_ISSUER:-we-ai-server}'
      JWT_ACCESS_TOKEN_EXPIRATION: '${JWT_ACCESS_TOKEN_EXPIRATION:-PT1H}'
      JWT_REFRESH_TOKEN_EXPIRATION: '${JWT_REFRESH_TOKEN_EXPIRATION:-P7D}'
      SWAGGER_ENABLED: '${SWAGGER_ENABLED:-false}'
      APP_BASE_URL: '${APP_BASE_URL:-http://localhost:8080}'
      APP_FRONTEND_BASE_URL: '${APP_FRONTEND_BASE_URL:-http://localhost:3000}'
      APP_API_DOMAIN: '${APP_API_DOMAIN:-localhost}'
      APP_FRONTEND_DOMAIN: '${APP_FRONTEND_DOMAIN:-localhost}'
      APP_STORAGE_CONSOLE_DOMAIN: '${APP_STORAGE_CONSOLE_DOMAIN:-localhost}'
      KAKAO_CLIENT_ID: '${KAKAO_CLIENT_ID}'
      KAKAO_REDIRECT_URI: '${KAKAO_REDIRECT_URI}'
      NAVER_CLIENT_ID: '${NAVER_CLIENT_ID}'
      NAVER_CLIENT_SECRET: '${NAVER_CLIENT_SECRET}'
      NAVER_REDIRECT_URI: '${NAVER_REDIRECT_URI}'
      GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID}'
      GOOGLE_CLIENT_SECRET: '${GOOGLE_CLIENT_SECRET}'
      GOOGLE_REDIRECT_URI: '${GOOGLE_REDIRECT_URI}'
      AUTH_VERIFICATION_CODE_LENGTH: '${AUTH_VERIFICATION_CODE_LENGTH:-6}'
      AUTH_VERIFICATION_EXPIRATION: '${AUTH_VERIFICATION_EXPIRATION:-PT5M}'
      AUTH_VERIFICATION_MOCK_ENABLED: '${AUTH_VERIFICATION_MOCK_ENABLED:-false}'
      AUTH_VERIFICATION_EXPOSE_CODE_IN_RESPONSE: '${AUTH_VERIFICATION_EXPOSE_CODE_IN_RESPONSE:-false}'
      AUTH_VERIFICATION_EMAIL_SUBJECT: '${AUTH_VERIFICATION_EMAIL_SUBJECT:-[WE AI] Login verification code}'
      AUTH_VERIFICATION_EMAIL_FROM: '${AUTH_VERIFICATION_EMAIL_FROM:-}'
      MAIL_HOST: '${MAIL_HOST:-}'
      MAIL_PORT: '${MAIL_PORT:-587}'
      MAIL_USERNAME: '${MAIL_USERNAME:-}'
      MAIL_PASSWORD: '${MAIL_PASSWORD:-}'
      MAIL_SMTP_AUTH: '${MAIL_SMTP_AUTH:-true}'
      MAIL_SMTP_STARTTLS_ENABLE: '${MAIL_SMTP_STARTTLS_ENABLE:-true}'
      KAKAO_TALK_MESSAGE_URI: '${KAKAO_TALK_MESSAGE_URI:-https://kapi.kakao.com/v2/api/talk/memo/default/send}'
      MINIO_ENDPOINT: '${MINIO_ENDPOINT:-http://minio:9000}'
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minioadmin}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-change-me-minio-password}'
      MINIO_PUBLIC_BUCKET: '${MINIO_PUBLIC_BUCKET:-we-ai-public}'
      MINIO_PRIVATE_BUCKET: '${MINIO_PRIVATE_BUCKET:-we-ai-private}'
    expose:
      - '8080'
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8080/actuator/health/readiness > /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  mysql:
    image: 'mysql:${MYSQL_IMAGE_TAG:-8.4}'
    container_name: '${MYSQL_CONTAINER_NAME:-we-ai-mysql}'
    restart: unless-stopped
    environment:
      - 'MYSQL_DATABASE=${DB_NAME:-we_ai}'
      - 'MYSQL_PASSWORD=${DB_PASSWORD:-change-me-db-password}'
      - 'MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-change-me-root-password}'
      - 'MYSQL_USER=${DB_USERNAME:-weai}'
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - 'we-ai-mysql-data:/var/lib/mysql'
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -u${DB_USERNAME:-weai}
        - -p${DB_PASSWORD:-change-me-db-password}
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: 'quay.io/minio/minio:${MINIO_IMAGE_TAG:-latest}'
    container_name: '${MINIO_CONTAINER_NAME:-we-ai-minio}'
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}'
      - 'MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-change-me-minio-password}'
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - 'we-ai-minio-data:/data'

  minio-init:
    image: 'quay.io/minio/mc:${MINIO_MC_IMAGE_TAG:-latest}'
    container_name: '${MINIO_INIT_CONTAINER_NAME:-we-ai-minio-init}'
    depends_on:
      - minio
    restart: "no"
    environment:
      - 'MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}'
      - 'MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-change-me-minio-password}'
      - 'MINIO_PUBLIC_BUCKET=${MINIO_PUBLIC_BUCKET:-we-ai-public}'
      - 'MINIO_PRIVATE_BUCKET=${MINIO_PRIVATE_BUCKET:-we-ai-private}'
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO to be ready...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$$MINIO_PUBLIC_BUCKET;
      mc mb --ignore-existing local/$$MINIO_PRIVATE_BUCKET;
      mc anonymous set download local/$$MINIO_PUBLIC_BUCKET;
      echo 'MinIO buckets are ready.';
      "

  nginx:
    image: 'nginx:${NGINX_IMAGE_TAG:-stable-alpine}'
    container_name: '${NGINX_CONTAINER_NAME:-we-ai-nginx}'
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: '${BACKEND_UPSTREAM:-host.docker.internal:8080}'
      NGINX_SERVER_NAME: '${NGINX_SERVER_NAME:-_}'
    depends_on:
      app:
        condition: service_healthy
        required: false
      minio:
        condition: service_started
      minio-init:
        condition: service_started
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - './docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro'
      - './docker/nginx/index.html:/usr/share/nginx/html/index.html:ro'

volumes:
  we-ai-mysql-data:
  we-ai-minio-data:
